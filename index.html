<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Meet with Michael - Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f5f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .chat-container {
      width: 400px;
      height: 600px;
      background: #fff;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .chat-header {
      padding: 15px;
      background: #000;
      color: #fff;
      text-align: center;
      font-weight: bold;
    }
    .chat-box {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }
    .message {
      margin-bottom: 10px;
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 75%;
      line-height: 1.4;
    }
    .bot {
      background: #eee;
      align-self: flex-start;
    }
    .user {
      background: #000;
      color: #fff;
      align-self: flex-end;
    }
    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }
    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }
    button {
      padding: 10px 15px;
      border: none;
      background: #000;
      color: #fff;
      cursor: pointer;
    }
    .quick-buttons {
      padding: 10px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .quick-buttons button {
      background: #ddd;
      color: #000;
      border-radius: 10px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">Meet with Michael</div>
  <div id="chat" class="chat-box"></div>

  <div class="quick-buttons" id="quickButtons"></div>

  <div class="input-area">
    <input id="input" placeholder="Type your message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
